services:
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: chatbot-pgvector
    environment:
      POSTGRES_DB: ${DB_NAME-postgres}
      POSTGRES_USER: ${DB_USERNAME-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD-Th1234}
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USERNAME-postgres} -d $${DB_NAME-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: chatbot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pgvector_data:
  ollama_data:
