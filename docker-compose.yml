services:
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: chatbot-pgvector
    environment:
      POSTGRES_DB: ${DB_NAME-postgres}
      POSTGRES_USER: ${DB_USERNAME-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD-Th1234}
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USERNAME-postgres} -d $${DB_NAME-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: chatbot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  n8n:
    image: n8nio/n8n
    container_name: chatbot-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_HOST=localhost
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  pgvector_data:
  ollama_data:
  n8n_data:
