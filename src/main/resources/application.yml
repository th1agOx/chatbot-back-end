spring:
  application:
    name: chatbot-api

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5433}/${DB_NAME:postgres}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Th1234}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties: {}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  ai:
    openai:
      api-key: ${OPEN_ROUTER_API_KEY}
      base-url: https://openrouter.ai/api
      chat:
        options:
          model: google/gemma-2-9b-it:free
      embedding:
        base-url: https://openrouter.ai/api/v1
        options:
          model: openai/text-embedding-3-small

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  n8n:
    webhook-url: ${N8N_WEBHOOK_URL}
  rag:
    top-k: 5
    min-similarity: 0.75
    max-context-size: 2000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
