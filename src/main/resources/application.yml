
spring:
  application:
    name: chatbot-api

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5433}/${DB_NAME:postgres}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Th1234}



  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties: {}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.2:1b
          timeout: 30s
      embedding:
        options:
          model: nomic-embed-text
          timeout: 30s

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  n8n:
    enabled: true
    webhook-url: ${N8N_WEBHOOK_URL}
  rag:
    top-k: 10
    min-similarity: 0.3
    max-context-size: 4000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
